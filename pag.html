<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Prueba de HTML con FireBase</title>
</head>

<body>

    <h1>Registro de Usuarios</h1>
    <input type="text" id="username" placeholder="Ingrese su nombre de usuario">
    
    <button onclick="guardar()">
        Registrar
    </button>
    <button onclick="mostrar()">Mostrar Registros</button>

    <hr>
    <div id="resuldatos"></div>

    <script type="module">
        // 1. Corregidas las importaciones usando las URLs CDN completas v9
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, addDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        // Tus llaves reales de Firebase
        const firebaseConfig = {
    apiKey: "AIzaSyAeEyUdY874i2z_VkI-qli2gV5w84OcrxU",
    authDomain: "prueba123-8d7c8.firebaseapp.com",
    projectId: "prueba123-8d7c8",
    storageBucket: "prueba123-8d7c8.firebasestorage.app",
    messagingSenderId: "120442939287",
    appId: "1:120442939287:web:a500394723baabe5dcc6d2"
  };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 2. Definimos window.guardar para enlazarla con el botón "Registrar"
        window.guardar = async function () {
            const usernameValue = document.getElementById('username').value;
            
            if (!usernameValue.trim()) {
                alert('Por favor, ingrese un nombre de usuario.');
                return;
            }

            try {
                // Modificado para que use el valor correcto del input
                await addDoc(collection(db, 'usuarios'), { 
                    username: usernameValue 
                });
                alert('¡Usuario registrado con éxito!');
                document.getElementById('username').value = ''; // Limpia el input
            }
            catch (error) {
                console.error(error);
                alert('Error al guardar registro: ' + error.message);
            }
        }

        // 3. Función para mostrar los registros
        window.mostrar = async function () {
            try {
                const querySnapshot = await getDocs(collection(db, 'usuarios'));
                const resuldatos = document.getElementById('resuldatos');
                resuldatos.innerHTML = '';
                
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    resuldatos.innerHTML += `<p>${data.username}</p>`;
                });
            } catch (error) {
                console.error(error);
                alert('Error al consultar registros: ' + error.message);
            }
        }
    </script>

</body>

</html>
